name: SonarCloud Analysis

# Trigger: monatlich + manuell (kein push/PR — spart Actions-Minuten/Sonar-Limits).
# Manuell: Actions-Tab -> "Run workflow", oder `gh workflow run "SonarCloud Analysis"`.
# Scheduled-Workflows laufen auf dem Default-Branch; GitHub pausiert sie nach
# 60 Tagen Repo-Inaktivität (dann einmal manuell re-aktivieren).
on:
  schedule:
    - cron: '0 4 1 * *'   # 1. des Monats, 04:00 UTC — periodische Baseline
  workflow_dispatch: {}     # Handstart

permissions:
  contents: read

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check SONAR_TOKEN
        id: check
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "SONAR_TOKEN nicht gesetzt — Analyse übersprungen"
          fi

      - name: Cache SonarCloud packages
        if: steps.check.outputs.run == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Set up Java 21
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build + Test (Java 21)
        if: steps.check.outputs.run == 'true'
        run: ./mvnw -B -ntp -pl climatedataanalyser-api -am verify

      - name: Set up Java 21 (Scanner)
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: SonarCloud Scanner (Java 17)
        if: steps.check.outputs.run == 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw -B -ntp -pl climatedataanalyser-api -am org.sonarsource.scanner.maven:sonar-maven-plugin:3.11.0.3922:sonar
