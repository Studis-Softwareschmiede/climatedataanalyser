name: SonarCloud Analysis

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check SONAR_TOKEN
        id: check
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "SONAR_TOKEN nicht gesetzt — Analyse übersprungen"
          fi

      - name: Cache SonarCloud packages
        if: steps.check.outputs.run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Set up Java 11
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven

      - name: Build + Test (Java 11)
        if: steps.check.outputs.run == 'true'
        run: ./mvnw -B -ntp -pl climatedataanalyser-api -am verify

      - name: Set up Java 17 (Scanner)
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: SonarCloud Scanner (Java 17)
        if: steps.check.outputs.run == 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw -B -ntp -pl climatedataanalyser-api -am org.sonarsource.scanner.maven:sonar-maven-plugin:3.11.0.3922:sonar
