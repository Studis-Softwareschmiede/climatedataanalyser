# Release-Pipeline — ausgelöst durch annotiertes git-Tag vX.Y.Z.
# Baut das Docker-Image mit Semver-Tags und legt ein GitHub-Release mit Auto-Notes an.
# Security-Gate: secret-scan (gitleaks) + mvn test MÜSSEN grün sein vor dem Image-Build/Push.
name: release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write   # GitHub-Release anlegen
  packages: write   # ghcr.io pushen
jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret-Scan (gitleaks)
        run: docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest detect --source=/repo --no-git --redact -v

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'
          cache: maven
      - name: Run tests
        run: mvn -B -ntp -pl climatedataanalyser-api -am test

  image:
    needs: [secret-scan, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}   # wird automatisch klein geschrieben
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    needs: image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: GitHub-Release anlegen
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
