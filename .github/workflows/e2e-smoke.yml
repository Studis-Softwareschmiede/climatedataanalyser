# End-to-End-Runtime-Smoke (Container + echte MariaDB 11 wie prod + DWD-FTP-Import).
# Bewusst NICHT per-PR: externer FTP (opendata.dwd.de) + Minuten-Laufzeit.
# Manuell (workflow_dispatch) oder nightly. Deckt die H2-Unit-Test-Blindstellen ab
# (Flyway-Modul/Dialekt/Treiber, gepacktes Image, non-root-Pfade, async-JobLauncher).
name: e2e-smoke
on:
  workflow_dispatch:
    inputs:
      withFTP:
        description: "echten DWD-FTP-Download fahren"
        type: boolean
        default: true
  schedule:
    - cron: "0 3 * * 0"   # wöchentlich So 03:00 UTC
permissions:
  contents: read
jobs:
  e2e:
    runs-on: ubuntu-latest
    # Außen-Limit großzügiger als JOB_TIMEOUT: Image-Build + DWD-FTP-Download (auf dem
    # Shared-Runner mehrere Minuten) + Voll-Import (745k Records) + Climate-Berechnung
    # passten nicht in 30min/900s → Lauf brach mit Job STARTED@240k ab (DB schrieb noch).
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - name: E2E FTP smoke
        env:
          WITHFTP: ${{ github.event.inputs.withFTP != 'false' }}
          # 900s war zu knapp (allein der FTP-Download fraß den Großteil); 1800s gibt dem
          # mehrstufigen Import (temperature→station→climate) auf dem Runner Luft.
          JOB_TIMEOUT: "1800"
        run: bash scripts/e2e-ftp-smoke.sh climatedataanalyser:e2e
